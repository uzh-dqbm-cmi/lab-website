# Archives the lab's LinkedIn posts into data/linkedin_posts.yaml.
#
# NOTE: this job does NOT affect what visitors see. The website shows the
# SociableKIT widget, which updates on its own (on the free plan, after a
# manual sync in the SociableKIT dashboard). This job only keeps a backup
# of the posts in the repo, so that if SociableKIT ever disappears the
# site can switch back to self-hosted rendering (see the comments in
# content/home/linkedin.md) without losing the post history.
#
# Runs daily and commits any new posts directly — nothing to review.
# Can also be run by hand (Actions -> Run workflow), optionally pasting
# post URLs to archive specific posts.
name: LinkedIn feed archive

on:
  workflow_dispatch:
    inputs:
      post_urls:
        description: "LinkedIn post URL(s), separated by spaces (optional)"
        required: false
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Archive posts (from the SociableKIT data feed and/or input URLs)
        env:
          LINKEDIN_RSS_URL: ${{ secrets.LINKEDIN_RSS_URL }}
          POST_URLS: ${{ inputs.post_urls }}
        run: |
          pip install pyyaml
          python scripts/fetch_linkedin_posts.py $POST_URLS

      - name: Commit any changes
        run: |
          if git diff --quiet data/linkedin_posts.yaml; then
            echo "No new posts."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/linkedin_posts.yaml
          git commit -m "Archive new LinkedIn posts"
          git push
