# LinkedIn posts shown on the website (homepage section + /linkedin/ page).
# Newest first — display order follows this file.
#
# To add a post manually:
#   1. On the LinkedIn post, open the "..." menu and choose "Embed this post".
#   2. Copy the URN from the iframe src (e.g. urn:li:activity:1234567890123456789
#      or urn:li:share:...). You can also just copy the digits after "activity-"
#      in the post's URL and use urn:li:activity:<digits>.
#   3. Add an entry at the TOP of the list below, commit, and push.
#
# Entry fields:
#   urn:    the post URN (or use `src:` with a full embed URL instead)
#   height: optional iframe height in px (default 570) — tune per post
#   note:   optional human-readable reminder of what the post is
#   label:  optional caption shown above the embed on the website, e.g.
#           "Reposted by KrauthammerLab". Use for instant reposts: those have
#           no embeddable post of their own, so embed the ORIGINAL post's URN
#           and add this label. (Reposts made with commentary have their own
#           URN and need no label.)
#
# Easier: on GitHub go to Actions -> "LinkedIn feed update" -> Run workflow
# and paste the post's URL — it opens a pull request with the entry for you.
#
# NOTE: only posts visible to logged-OUT visitors can be embedded. If an
# embed shows "Sign in ... This post is unavailable", the author restricts
# it and it cannot be shown here — remove the entry. Check embeds in the
# PR's deploy preview (in a private browser window) before merging.
