- urn: urn:li:ugcPost:7475160377027194881
  note: 'Farhad Nooralahzadeh: RadVLM / healthcare AI (2026-06)'
  label: Reposted by KrauthammerLab
  author: Farhad Nooralahzadeh
  meta: Principal Scientist/Lecturer at ZHAW
  date: June 2026
  text: |-
    It was a great opportunity to present our RadVLM project at the AWS AI Health Leaders Forum in Zurich and share how we are building a Vision Language Model for Radiology.

    A big thank you to AWS for the invitation and for bringing together healthcare leaders, researchers, and AI innovators to discuss the future of AI in healthcare.

    We are also grateful to AWS for providing the cloud infrastructure that enables us to serve our models efficiently, helping us bring cutting-edge AI capabilities closer to real-world clinical applications.

    It was inspiring to exchange ideas with experts across the healthcare and AI ecosystem, and I look forward to future collaborations.

    #RadVLM #HealthcareAI #MedicalImaging #VisionLanguageModels #AWS #AWSforHealth #AIinHealthcare KrauthammerLab
  image: https://data-image.sociablekit.com/sources/linkedin-page-posts/krauthammerlab/7475165430458855424-images-0.webp?nocache=1784734528
- urn: urn:li:ugcPost:7469736481406910464
  note: 'Farhad Nooralahzadeh: AI / generative AI / LLM (2026-06)'
  label: Reposted by KrauthammerLab
  date: June 2026
  text: |-
    Excited to have contributed to the CAS in Medical Leadership at the University of Zurich, together with Prof.Michael Krauthammer and Ahmed Allam.

    As part of the Artificial Intelligence & Machine Learning module, we designed and delivered content focused on ML, Large Language Models (LLMs), and AI in Medicine, moving beyond the hype to explore how these systems are actually built, trained, and applied in healthcare.

    The module aims to help healthcare leaders understand the foundations of AI and machine learning, machine learning workflows, real-world medical applications, and the opportunities and limitations of these technologies in clinical practice.

    My contribution focused on:
     🔹 The fundamentals of Large Language Models
     🔹 How LLMs are trained and fine-tuned
     🔹 Data, compute, and alignment considerations
     🔹 Critical thinking around responsible AI adoption in medicine

    What made this experience particularly rewarding was the opportunity to engage with healthcare professionals who are actively shaping the future of medicine and leadership. Bridging the gap between cutting-edge AI research and practical healthcare applications is one of the most important challenges—and opportunities—of our time.

    A big thank you to Prof. Krauthammer, Ahmed Allam, Barbara Krieger, and the entire MedLead team for the collaboration and the stimulating discussions.

    More info ---> https://lnkd.in/eeMWdJ_V

    #AI #GenerativeAI #LLM #MachineLearning #HealthcareAI #DigitalHealth #MedicalLeadership #UZH #ExecutiveEducation #ArtificialIntelligence KrauthammerLab
